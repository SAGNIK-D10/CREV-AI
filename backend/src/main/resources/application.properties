server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/crev_db
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=your_256_bit_secret_key_here_change_in_production
jwt.expiration.ms=86400000

# Claude API
claude.api.key=your_claude_api_key_here
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-6
claude.api.max_tokens=1500

# Rate limiting (requests per user per hour)
rate.limit.requests=20
rate.limit.window.minutes=60

# CORS
cors.allowed.origins=http://localhost:5173,http://localhost:3000
